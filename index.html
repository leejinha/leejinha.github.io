<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고독력 레벨 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .pulse-soft { animation: pulseSoft 2s infinite ease-in-out; }
        @keyframes pulseSoft { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 bg-gradient-to-tr from-slate-50 to-indigo-50">

    <div id="app" class="w-full max-w-md bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden p-8 transition-all duration-300">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center fade-in">
            <div class="mb-6 inline-flex justify-center items-center w-24 h-24 rounded-full bg-indigo-50 text-indigo-600 pulse-soft">
                <!-- Cover SVG Illustration -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 mb-3 tracking-tight">고독력 레벨 테스트</h1>
            <p class="text-slate-500 mb-8 leading-relaxed text-sm">
                타인의 소음에서 벗어나 나만의 시간을 마주하는 힘.<br>
                10가지 질문으로 당신의 진정한 '고독 레벨'을 만나보세요.
            </p>
            <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-lg shadow-indigo-200">
                테스트 시작하기
            </button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden fade-in">
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span id="progress-text" class="text-indigo-600 font-bold text-sm">1 / 10</span>
                    <span class="text-xs text-slate-400">나의 고독 지수는?</span>
                </div>
                <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar" class="bg-indigo-600 h-full rounded-full transition-all duration-300" style="width: 10%"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-xl font-bold text-slate-800 mb-8 min-h-[4rem] leading-snug">
                질문 텍스트가 들어갑니다.
            </h2>
            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center fade-in">
            <p class="text-indigo-600 font-semibold text-sm mb-1 uppercase tracking-wider">Your Solitude Level</p>
            <h2 id="result-title" class="text-3xl font-extrabold text-slate-900 mb-6">고독 레벨 결과</h2>
            
            <!-- Dynamic SVG Container -->
            <div id="result-image-container" class="w-48 h-48 mx-auto mb-6 flex items-center justify-center bg-slate-50 rounded-2xl border border-slate-100 p-2">
                <!-- SVG illustration will be loaded here -->
            </div>

            <p id="result-description" class="text-slate-600 mb-8 leading-relaxed text-sm text-left bg-slate-50 p-5 rounded-2xl border border-slate-100">
                결과 상세 설명이 들어갑니다.
            </p>
            
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition active:scale-[0.98]">
                다시 테스트하기
            </button>
        </div>
    </div>

    <script>

        const results = [
            {

            {
                title: "Lv.2 고독 여행가",
                graphic: levelGraphics.level2,
                desc: "타인과의 관계를 잘 유지하면서도 필요할 때 적절히 자신만의 여백을 즐길 줄 아는 건강한 균형가입니다. 혼자 카페에서 차를 마시거나 가볍게 식사하는 것에 대해 큰 거부감이 없네요. 고독을 두려워하기보다는 삶의 피로를 풀어줄 작은 안식처로 잘 활용하기 시작하는 단계입니다."
            },
            {
                title: "Lv.3 고독 수행자",
                graphic: levelGraphics.level3,
                desc: "복잡한 세상을 한 걸음 물러나 자연스럽게 바라보며 고막과 눈을 청정하게 유지할 줄 아는 사색가입니다. 누군가의 소음보다는 침묵이 때로는 더 큰 진실을 전해준다는 것을 알고 있습니다. 자신만의 비밀스러운 취미나 조용한 산책으로 인생의 균형을 아름답게 이끌어 나가는 상태입니다."
            },
            {
                title: "Lv.4 고독 전문가",
                graphic: levelGraphics.level4,
                desc: "혼자 있는 자유로운 공간이야말로 나만의 가능성이 피어나는 ‘축제의 장’이라고 정의하는 프로 창작자 스타일입니다. 남들의 불필요한 시선보다 내면의 단단한 성장에 초점을 맞추며 딥워크(Deep Work)나 고독한 예술적 몰입의 가치를 가장 깊이 이해하고 실천하는 고급 레벨입니다."
            },
            {
                title: "Lv.5 고독 마스터",
                graphic: levelGraphics.level5,
                desc: "축하합니다! 당신은 어떤 소란한 공간에서도 완벽한 나만의 평온을 즉시 창조할 수 있는 초월적 해탈의 고독 신선입니다. 타인과 협력할 때는 부드럽고 따뜻하게 동화되지만, 혼자가 되는 순간 완벽히 우주적인 만족감과 평화에 이릅니다. 주체적인 자아가 극도로 단단하여 흔들림이 없는 진정한 마스터의 자태를 가졌습니다."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border-2 border-slate-100 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50/50 hover:text-indigo-900 font-semibold text-slate-700 transition-all duration-200 active:scale-[0.99] fade-in";
                btn.style.animationDelay = `${idx * 0.08}s`;
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(opt.s);
                container.appendChild(btn);
            });
        }

        function selectOption(s) {
            score += s;
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let finalResult;
            
            // 점수 구간 상세 분할 (최소 10점 ~ 최대 40점)
            if (score <= 15) {
                finalResult = results[0]; // Lv.1 입문자
            } else if (score <= 23) {
                finalResult = results[1]; // Lv.2 여행가
            } else if (score <= 30) {
                finalResult = results[2]; // Lv.3 수행자
            } else if (score <= 36) {
                finalResult = results[3]; // Lv.4 전문가
            } else {
                finalResult = results[4]; // Lv.5 마스터
            }

            document.getElementById('result-title').innerText = finalResult.title;
            document.getElementById('result-image-container').innerHTML = finalResult.graphic;
            document.getElementById('result-description').innerText = finalResult.desc;
        }
    </script>
</body>
</html>

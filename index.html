<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고독력 레벨 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="app" class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden p-8">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center fade-in">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">고독력 레벨 테스트</h1>
            <p class="text-gray-600 mb-8 leading-relaxed">
                당신은 혼자만의 시간을 얼마나 즐길 수 있나요?<br>
                10가지 질문을 통해 당신의 '고독 레벨'을 측정해보세요!
            </p>
            <button onclick="startTest()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-indigo-700 transition">테스트 시작하기</button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden fade-in">
            <div class="mb-4 flex justify-between items-center">
                <span id="progress-text" class="text-indigo-600 font-bold">1 / 10</span>
                <div class="w-2/3 bg-gray-200 rounded-full h-2">
                    <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 10%"></div>
                </div>
            </div>
            <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-6 min-h-[3.5rem]">질문 텍스트가 들어갑니다.</h2>
            <div id="options-container" class="space-y-3">
                <!-- Options will be injected here -->
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden text-center fade-in">
            <p class="text-indigo-600 font-bold mb-2">당신의 테스트 결과는...</p>
            <h2 id="result-title" class="text-4xl font-bold text-gray-900 mb-4">고독 마스터</h2>
            <div id="result-image" class="text-6xl mb-6">🧘‍♂️</div>
            <p id="result-description" class="text-gray-600 mb-8 leading-relaxed text-left bg-gray-50 p-4 rounded-lg">결과 상세 설명이 들어갑니다.</p>
            <button onclick="location.reload()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold hover:bg-gray-900 transition">다시 하기</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "금요일 저녁, 잡혀있던 약속이 갑자기 취소되었을 때 당신의 반응은?",
                o: [
                    { t: "너무 허전해서 다른 친구에게 연락한다.", s: 1 },
                    { t: "조금 아쉽지만 밀린 TV 프로그램을 본다.", s: 2 },
                    { t: "오히려 좋아! 나만의 시간을 즐길 준비를 한다.", s: 4 },
                    { t: "이미 혼자 놀 계획을 플랜 B로 짜두었다.", s: 3 }
                ]
            },
            {
                q: "유명 맛집에 가고 싶은데 같이 갈 사람이 없다면?",
                o: [
                    { t: "절대 혼자 못 간다. 포기하거나 배달시킨다.", s: 1 },
                    { t: "바(Bar) 형태의 좌석이 있다면 시도해본다.", s: 2 },
                    { t: "당당하게 가서 1인분(혹은 그 이상)을 즐긴다.", s: 4 },
                    { t: "사람들의 시선이 적은 시간대에 몰래 다녀온다.", s: 3 }
                ]
            },
            {
                q: "당신에게 '디지털 디톡스(스마트폰 없이 지내기)'란?",
                o: [
                    { t: "10분도 못 버틴다. 세상과 단절된 느낌이다.", s: 1 },
                    { t: "마음먹으면 반나절 정도는 가능하다.", s: 3 },
                    { t: "가끔 일부러 전원을 끄고 고요함을 즐긴다.", s: 4 },
                    { t: "필요성은 느끼지만 실행은 어렵다.", s: 2 }
                ]
            },
            {
                q: "혼자 떠나는 해외 여행에 대해 어떻게 생각하나요?",
                o: [
                    { t: "생각만 해도 무섭고 외로울 것 같다.", s: 1 },
                    { t: "한 번쯤은 도전해보고 싶지만 용기가 안 난다.", s: 2 },
                    { t: "이미 다녀왔거나, 주기적으로 즐긴다.", s: 4 },
                    { t: "패키지 여행은 혼자 갈 수 있을 것 같다.", s: 3 }
                ]
            },
            {
                q: "카페에서 옆 테이블의 수다가 너무 시끄러울 때 당신은?",
                o: [
                    { t: "나도 누군가에게 전화를 걸어 같이 떠든다.", s: 1 },
                    { t: "불편하지만 꾹 참고 스마트폰만 본다.", s: 2 },
                    { t: "이어폰을 끼고 나만의 세계로 깊이 몰입한다.", s: 4 },
                    { t: "자리를 옮기거나 정중히 양해를 구한다.", s: 3 }
                ]
            },
            {
                q: "당신의 생일을 혼자 보내게 된다면?",
                o: [
                    { t: "비참한 기분이 들 것 같아 아무에게나 연락한다.", s: 1 },
                    { t: "조용히 미역국만 끓여 먹고 평소처럼 보낸다.", s: 2 },
                    { t: "최고급 호텔이나 식당을 예약해 나에게 선물한다.", s: 4 },
                    { t: "SNS에 알리지 않고 조용히 축하를 기다린다.", s: 3 }
                ]
            },
            {
                q: "대화 중 정적이 흐를 때 당신이 느끼는 감정은?",
                o: [
                    { t: "어색해서 견딜 수 없다. 아무 말이나 내뱉는다.", s: 1 },
                    { t: "상대방이 지루해할까 봐 걱정된다.", s: 2 },
                    { t: "침묵도 대화의 일부라고 생각하며 편안해한다.", s: 4 },
                    { t: "무슨 말을 해야 할지 머릿속으로 계산한다.", s: 3 }
                ]
            },
            {
                q: "주말 내내 아무와도 대화하지 않는다면?",
                o: [
                    { t: "입에 가시가 돋을 것 같고 우울해진다.", s: 1 },
                    { t: "일요일 저녁쯤 되면 목소리가 안 나올까 봐 걱정된다.", s: 2 },
                    { t: "최고의 휴식이다. 에너지가 풀충전된다.", s: 4 },
                    { t: "AI 스피커나 반려동물과 대화해서 괜찮다.", s: 3 }
                ]
            },
            {
                q: "나와 의견이 다른 다수의 사람들 속에 있을 때 당신은?",
                o: [
                    { t: "소외되기 싫어서 다수의 의견에 맞춘다.", s: 1 },
                    { t: "침묵을 지키며 상황을 관망한다.", s: 2 },
                    { t: "혼자가 되더라도 내 소신을 명확히 밝힌다.", s: 4 },
                    { t: "은근슬쩍 내 의견을 섞어보려고 노력한다.", s: 3 }
                ]
            },
            {
                q: "당신에게 '고독'이란 무엇인가요?",
                o: [
                    { t: "피하고 싶은 외로움과 고통", s: 1 },
                    { t: "어쩔 수 없이 견뎌야 하는 시간", s: 2 },
                    { t: "나를 성장시키는 귀중한 자산", s: 4 },
                    { t: "가끔은 필요하지만 오래 두긴 싫은 것", s: 3 }
                ]
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startTest() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').innerText = `${currentIdx + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIdx + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.o.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 border-2 border-gray-100 rounded-xl hover:border-indigo-500 hover:bg-indigo-50 transition fade-in";
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(opt.s);
                container.appendChild(btn);
            });
        }

        function selectOption(s) {
            score += s;
            currentIdx++;
            if (currentIdx < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            let title = "";
            let desc = "";
            let emoji = "";

            if (score <= 15) {
                title = "고독 초보자";
                emoji = "🐣";
                desc = "혼자 있는 것을 어색해하고 타인의 존재에서 에너지를 얻는 타입입니다. 혼밥이나 혼자 여행은 아직 거대한 도전처럼 느껴질 수 있어요. 하지만 가끔은 5분만이라도 스마트폰을 내려놓고 자신의 마음속 목소리에 귀를 기울여보는 건 어떨까요?";
            } else if (score <= 25) {
                title = "고독 여행가";
                emoji = "🏃‍♂️";
                desc = "혼자만의 시간을 적당히 즐길 줄 아는 건강한 상태입니다. 필요할 때는 혼자 밥을 먹거나 쇼핑을 하는 것에 큰 거부감이 없네요. 고독을 두려워하기보다 삶의 여백으로 활용하기 시작한 단계입니다.";
            } else if (score <= 35) {
                title = "고독 전문가";
                emoji = "🧗";
                desc = "혼자 있는 시간이야말로 진정한 자신을 만나는 축제라고 생각하시네요! 남들의 시선보다는 나의 내면적 만족이 훨씬 중요합니다. 고독을 통해 창의적인 생각을 하거나 에너지를 재충전하는 능력이 탁월합니다.";
            } else {
                title = "고독 마스터";
                emoji = "🧘‍♂️";
                desc = "축하합니다! 당신은 고독의 경지에 도달했습니다. 타인과 함께일 때도 즐겁지만, 혼자일 때 완벽한 자유와 평온을 느낍니다. 어떤 환경에서도 휘둘리지 않는 단단한 자아를 가졌으며, 고독을 즐거움으로 승화시킨 진정한 마스터입니다.";
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-image').innerText = emoji;
            document.getElementById('result-description').innerText = desc;
        }
    </script>
</body>
</html>

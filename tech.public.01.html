<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 서재 속 출판사 성향 테스트</title>
    <!-- 구글 폰트 적용 (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-left: #3b82f6; /* 진보·좌파 성향 블루 */
            --primary-right: #ef4444; /* 보수·우파 성향  */
            --btn-main: #002855;     /* 요청하신 메인 네이비 컬러 */
            --btn-main-hover: #001f42; /* 메인 네이비 호버 색상 */
            --bg-gradient: linear-gradient(135deg, #eef2f7 0%, #d1dbe5 100%); /* 네이비와 어울리는 은은한 블루 그레이 배경 */
            --card-bg: #ffffff;
            --text-main: #0f172a;    /* 조금 더 깊이감 있는 네이비 블랙 */
            --text-muted: #475569;   /* 조화로운 톤의 뮤트 가이드 텍스트 */
            --shadow-color: rgba(0, 40, 85, 0.08); /* 네이비 톤에 맞춘 부드러운 그림자 음영 */
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 100%;
            max-width: 580px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.3s ease;
        }

        /* 시작 화면 */
        .start-screen h1 {
            font-size: 26px;
            color: var(--text-main);
            margin-bottom: 18px;
            word-break: keep-all;
            line-height: 1.4;
        }

        .start-screen p {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.7;
            word-break: keep-all;
        }

        /* 공통 버튼 스타일 */
        .btn {
            background: var(--btn-main);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: var(--btn-main-hover);
            box-shadow: 0 5px 15px rgba(0, 40, 85, 0.2);
        }

        .btn-sub {
            background: #f0f4f8; /* 네이비와 매칭되는 밝은 블루그레이 음영 */
            color: var(--btn-main);
            border: 1px solid #dbe3eb;
        }

        .btn-sub:hover {
            background: #e1ebf5;
            box-shadow: 0 5px 15px rgba(0, 40, 85, 0.08);
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
        }
        .btn-instagram:hover {
            opacity: 0.9;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            box-shadow: 0 5px 15px rgba(220, 39, 67, 0.2);
        }
        
        /* 인스타그램 SVG 아이콘 스타일 */
        .btn-instagram svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* 테스트 화면 */
        .quiz-screen {
            display: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary-left), var(--primary-right));
            transition: width 0.3s ease;
        }

        .question-box {
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.5;
            word-break: keep-all;
        }

        .answer-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            color: var(--text-main);
            padding: 14px 20px;
            font-size: 14px;
            font-weight: 400;
            border-radius: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            word-break: keep-all;
            line-height: 1.4;
        }

        .option-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        /* 결과 화면 */
        .result-screen {
            display: none;
        }

        .result-title {
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-type {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .result-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 25px;
            text-align: left;
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            word-break: keep-all;
            border: 1px solid #f1f5f9;
        }

        /* 게이지 바 */
        .spectrum-container {
            margin: 25px 0;
            position: relative;
        }
        .spectrum-bar {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(to right, var(--primary-left), #e2e8f0, var(--primary-right));
            width: 100%;
        }
        .spectrum-pointer {
            position: absolute;
            top: -4px;
            width: 20px;
            height: 20px;
            background: var(--btn-main);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translateX(-50%);
            transition: left 0.5s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .spectrum-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
        }

        /* 결과 페이지 버튼 그룹 */
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .action-row .btn {
            flex: 1;
        }

        /* 모바일 화면 최적화 미디어 쿼리 */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }
            .action-row {
                flex-direction: column;
                gap: 10px;
            }
            .btn {
                width: 100%;
                padding: 14px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 시작 화면 -->
        <div class="start-screen" id="start-screen">
            <h1>"너... 그런 책 읽니?" 👀<br><span style="font-size: 18px; font-weight: 400; color: var(--text-muted);">내 서재로 탈탈 털어보는 출판사 성향 테스트</span></h1>
            <p>"책장만 봐도 그 사람의 사상이 보인다?!" 내가 최근에 지른 책, 침대 머리맡에 둔 책들의 진짜 정체는 무엇일까요? 매번 무작위로 섞이는 질문을 통과하고, 내 서재를 지배한 출판사들의 찐-한 이념 스펙트럼을 확인해 보세요! (※ 뼈 때림 주의 🔨)</p>
            <button class="btn" onclick="startQuiz()">내 서재 털러가기 🚀</button>
        </div>

        <!-- 2. 테스트 진행 화면 -->
        <div class="quiz-screen" id="quiz-screen">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-box">
                <p class="question-text" id="question-text">질문 텍스트가 들어가는 자리입니다.</p>
            </div>
            <div class="answer-options">
                <button class="option-btn" id="opt1">선택지 1</button>
                <button class="option-btn" id="opt2">선택지 2</button>
                <button class="option-btn" id="opt3">선택지 3</button>
                <button class="option-btn" id="opt4">선택지 4</button>
            </div>
        </div>

        <!-- 3. 결과 화면 -->
        <div class="result-screen" id="result-screen">
            <p class="result-title">서재 진단 결과</p>
            <h2 class="result-type" id="result-type">결과 유형</h2>
            
            <div class="spectrum-container">
                <div class="spectrum-bar"></div>
                <div class="spectrum-pointer" id="spectrum-pointer"></div>
                <div class="spectrum-labels">
                    <span style="color: var(--primary-left)">진보·좌파 성향</span>
                    <span style="color: var(--primary-right)">보수·우파 성향</span>
                </div>
            </div>

            <div class="result-desc" id="result-desc">
                상세 설명이 들어가는 자리입니다.
            </div>

            <!-- 하단 버튼 및 링크 영역 -->
            <div class="action-group">
                <div class="action-row">
                    <button class="btn btn-sub" onclick="shareResult()">결과 링크 복사</button>
                    <button class="btn" onclick="restartQuiz()">다시 테스트하기</button>
                </div>
                <a href="https://www.instagram.com/hapublic.basecamp" target="_blank" class="btn btn-instagram">
                    <!-- 인스타그램 공식 SVG 로고 -->
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.051.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                    </svg>
                    @hapublic.basecamp 바로 가기
                </a>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "1. 서점에서 책을 고를 때, 내가 가장 매력을 느끼는 문구의 결은?",
                options: [
                    { text: "“불평등한 구조를 깨부수고 소외된 이들의 연대로”", val: 2 },
                    { text: "“더 나은 공동체를 위해 우리가 함께 고민해야 할 가치들”", val: 1 },
                    { text: "“트렌드를 선도하는 실용적 지식과 합리적인 선택법”", val: -1 },
                    { text: "“자유시장 경제의 미래, 개인이 쟁취해야 할 성공의 법칙”", val: -2 }
                ]
            },
            {
                q: "2. 내가 고른 사회·경제 분야 책들의 주된 문제의식은?",
                options: [
                    { text: "자본주의의 폐해 폭로, 노동권 강화, 과감한 복지 제도 확대", val: 2 },
                    { text: "시민 참여의 중요성, 환경 보호, 지속 가능한 대안 경제", val: 1 },
                    { text: "현실적인 재테크 전략, 자산 관리, 시장 경제의 흐름 분석", val: -1 },
                    { text: "정부 규제 완화의 필요성, 세금 감면론, 기업가 정신 고취", val: -2 }
                ]
            },
            {
                q: "3. 내 서재에 꽂힌 역사서나 인물 평전은 주로 어떤 내용인가요?",
                options: [
                    { text: "소외된 민중들의 저항 운동이나 인권 투쟁을 다룬 대안 역사", val: 2 },
                    { text: "과거의 아픔을 성찰하고 민주주의의 발전 과정을 다룬 역사", val: 1 },
                    { text: "특정 이념을 배제하고 철저한 사실과 사료 중심으로 서술된 역사", val: -1 },
                    { text: "국가를 위기에서 구한 강력한 리더십과 정통성을 수호한 영웅의 서사", val: -2 }
                ]
            },
            {
                q: "4. 환경 및 과학 도서를 읽을 때 내가 가장 공감했던 시각은?",
                options: [
                    { text: "기후위기는 자본의 무한 경쟁 때문이며, 강력한 국가 규제 체제가 시급하다.", val: 2 },
                    { text: "소비 중심 문화를 반성하고 공동체적 생태주의 삶으로 전환해야 한다.", val: 1 },
                    { text: "기후위기 문제는 현실적으로 다루되 과학 기술의 균형 잡힌 발전을 믿는다.", val: -1 },
                    { text: "인위적인 규제보다는 기술 혁신과 친환경 시장 경제 논리로 해결해야 한다.", val: -2 }
                ]
            },
            {
                q: "5. 내가 팔로우하는 출판사 SNS나 뉴스레터에서 자주 보이는 키워드는?",
                options: [
                    { text: "#소수자 #연대 #인권 #페미니즘 #다양성", val: 2 },
                    { text: "#공동체 #인문학 #시민 #성찰 #생태", val: 1 },
                    { text: "#실용 #지식 #교양 #트렌드 #합리성", val: -1 },
                    { text: "#자유 #성장 #성공 #전통 #경쟁력", val: -2 }
                ]
            },
            {
                q: "6. 내 서재에 있는 책 저자들의 주요 이력이나 정체성은?",
                options: [
                    { text: "사회 운동가, 인권 변호사, 비판적 학자 등 현장 중심 인물", val: 2 },
                    { text: "대중 지식인, 문화 평론가, 온건한 성향의 대학교수나 연구원", val: 1 },
                    { text: "주류 학계의 교수, 객관적 데이터 중심의 분석가, 전문 칼럼니스트", val: -1 },
                    { text: "글로벌 기업 CEO, 창업가, 시장 중심 경제학자, 보수 평론가", val: -2 }
                ]
            },
            {
                q: "7. 문화·예술 관련 책을 읽을 때 깊이 공감했던 관점은?",
                options: [
                    { text: "소수 예술가와 독립 출판을 지키기 위한 정부의 전폭적 예산 지원이 필요하다.", val: 2 },
                    { text: "자본의 논리에 물들지 않는 공공 예술의 영역을 더 넓혀야 한다.", val: 1 },
                    { text: "문화 예술 역시 대중의 선택을 받아 자생할 수 있는 기반이 중요하다.", val: -1 },
                    { text: "예술계도 정부 보조금에 의존하기보다 시장 경쟁력을 갖추고 홀로서기를 해야 한다.", val: -2 }
                ]
            },
            {
                q: "8. 소설이나 에세이 장르를 고를 때 나의 선호도는?",
                options: [
                    { text: "젠더, 퀴어, 소수자 등 사회적 소수자의 서사를 담은 문학을 적극적으로 읽는다.", val: 2 },
                    { text: "타인의 슬픔에 공감하고 공동체의 따뜻함을 다룬 감성 소설/에세이를 좋아한다.", val: 1 },
                    { text: "인간 본성에 대한 탐구나 흥미진진한 서사 구조 중심의 문학을 선호한다.", val: -1 },
                    { text: "고전적 가치관, 가족의 소중함, 혹은 영웅적 대서사시 장르에 끌린다.", val: -2 }
                ]
            },
            {
                q: "9. 내 책장에 꽂힌 지식·실용서들의 주된 성격은?",
                options: [
                    { text: "현대 자본주의 사회의 모순을 날카롭게 비판하는 사회학 서적", val: 2 },
                    { text: "인간과 삶에 대한 따뜻한 위로와 철학적 성찰을 주는 인문 서적", val: 1 },
                    { text: "업무 생산성 향상, 교양 축적, 지적 대화를 위한 넓고 얕은 지식 서적", val: -1 },
                    { text: "치열한 경쟁에서 이기기 위한 자기계발 및 자산 증식용 재테크 서적", val: -2 }
                ]
            },
            {
                q: "10. 내가 책을 읽으며 가장 이상적이라고 느낀 '정의로운 사회'의 상은?",
                options: [
                    { text: "결과의 불평등을 좁히고 약자가 차별받지 않도록 제도적으로 보장된 사회", val: 2 },
                    { text: "이웃과 연대하며 소외되는 사람 없이 소통이 잘 이루어지는 사회", val: 1 },
                    { text: "기회가 균등하게 제공되며 상식과 합리가 통하는 사회", val: -1 },
                    { text: "개인의 자유와 노력이 철저히 존중받고 시장 규칙에 따라 보상받는 사회", val: -2 }
                ]
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let resultTypeName = "";

        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const questionText = document.getElementById('question-text');
        const progressBar = document.getElementById('progress-bar');

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function startQuiz() {
            startScreen.style.display = 'none';
            quizScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            currentIdx = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            if (currentIdx < questions.length) {
                progressBar.style.width = `${(currentIdx / questions.length) * 100}%`;
                questionText.innerText = questions[currentIdx].q;
                
                const shuffledOptions = shuffle([...questions[currentIdx].options]);
                
                for (let i = 0; i < 4; i++) {
                    const btn = document.getElementById(`opt${i+1}`);
                    btn.innerText = shuffledOptions[i].text;
                    btn.setAttribute('onclick', `selectOption(${shuffledOptions[i].val})`);
                }
            } else {
                showResult();
            }
        }

        function selectOption(value) {
            score += value;
            currentIdx++;
            showQuestion();
        }

        function showResult() {
            quizScreen.style.display = 'none';
            resultScreen.style.display = 'block';

            const resultType = document.getElementById('result-type');
            const resultDesc = document.getElementById('result-desc');
            const pointer = document.getElementById('spectrum-pointer');

            let percentage = 50 - (score * 2); 
            if(percentage < 5) percentage = 5;
            if(percentage > 95) percentage = 95;
            pointer.style.left = `${percentage}%`;

            if (score > 10) {
                resultTypeName = "선명한 진보·좌파 성향의 서재";
                resultType.style.color = "var(--primary-left)";
                resultDesc.innerHTML = "당신의 서재는 <strong>사회적 연대, 소수자 인권, 다양성, 구조적 모순 비판</strong>을 핵심 가치로 내거는 출판사들의 책이 주를 이룹니다. 불평등한 사회 구조에 질문을 던지고, 대안적인 공동체를 적극적으로 모색하는 도서에 깊이 몰입하는 독서 성향을 가지고 있습니다.";
            } else if (score > 2) {
                resultTypeName = "따뜻한 인문 개혁 성향의 서재";
                resultType.style.color = "#60a5fa";
                resultDesc.innerHTML = "당신이 고른 책들은 보편적인 인문학적 성찰을 담으면서도 사회적 약자에 대한 따뜻한 시선과 점진적인 개혁을 이야기하는 출판사들의 도서가 많습니다. 지나치게 급진적이지 않으면서도 인간 존엄성과 민주주의의 가치를 강조하는 책을 선호하십니다.";
            } else if (score >= -2 && score <= 2) {
                resultTypeName = "균형 잡힌 중도 실용 성향의 서재";
                resultType.style.color = "#6b7280";
                resultDesc.innerHTML = "당신이 읽은 책들의 출판사는 어느 한쪽 이념에 치우치지 않고, <strong>독자에게 객관적인 지식과 유용한 통찰을 제공하는 실용적인 곳</strong>들이 많습니다. 균형 잡힌 시각의 교양서나 순수 학문, 혹은 대중적인 문학 중심의 안정적인 독서 패턴을 보이고 있습니다.";
            } else if (score >= -10) {
                resultTypeName = "합리적 보수·자기 성장 성향의 서재";
                resultType.style.color = "#f87171";
                resultDesc.innerHTML = "당신이 고른 책들은 <strong>개인의 자유, 끊임없는 역량 강화, 그리고 합리적인 지식</strong>을 신뢰하는 출판사들의 비중이 높습니다. 검증된 사실과 지적 전통을 존중하며, 스스로의 가치를 높여주는 자기계발이나 효율적인 경제 경영 지식을 담은 책들에 더 큰 매력을 느끼는 편입니다.";
            } else {
                resultTypeName = "선명한 보수·우파 성향의 서재";
                resultType.style.color = "var(--primary-right)";
                resultDesc.innerHTML = "당신의 서재는 <strong>자유시장 경제의 가치, 개인의 자율성과 책임, 정통성 수호</strong>를 강력하게 지지하는 출판사들의 책이 중심을 이룹니다. 리더들의 결단력 있는 서사, 자본주의 시장 시스템에 대한 확신, 혹은 고전적이고 안정적인 가치관을 강조하는 선명한 메시지의 도서를 선호하십니다.";
            }
            resultType.innerText = resultTypeName;
        }

        function shareResult() {
            const shareText = `[내 서재 속 출판사 성향 테스트]\n나의 진단 결과: ${resultTypeName}\n지금 테스트해보세요! 👉 ${window.location.href}`;
            
            navigator.clipboard.writeText(shareText).then(() => {
                alert("결과 텍스트와 링크가 클립보드에 복사되었습니다! 원하시는 곳에 붙여넣기(Ctrl+V) 하세요.");
            }).catch(err => {
                alert("복사에 실패했습니다. 주소창의 링크를 직접 공유해 주세요.");
            });
        }

        function restartQuiz() {
            startQuiz();
        }
    </script>
</body>
</html>
